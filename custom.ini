; Development Value: E_ALL
; Production Value: E_ALL & ~E_DEPRECATED & ~E_STRICT
; http://php.net
error_reporting = E_ALL

; Development Value: On
; Production Value: Off
; http://php.net
display_errors = On

; Development Value: On
; Production Value: Off
; http://php.net
display_startup_errors = On

; Development Value: On
; Production Value: On
; http://php.net
log_errors = On
html_errors = On

zend_extension=xdebug.so

; Basic Xdebug configuration
xdebug.cli_color = 1
xdebug.mode = develop,debug 
xdebug.start_with_request = yes
xdebug.client_host = 127.0.0.1
xdebug.client_port = 9003
xdebug.log = /tmp/xdebug.log
xdebug.start_with_request=trigger

; Mostra stack trace completo quando ocorre erro
xdebug.show_error_trace = 1

; Mostra exceções com stack trace
xdebug.show_exception_trace = 1

; Mostra variáveis no stack trace
xdebug.collect_vars = On
xdebug.collect_params = 4

; Limite de profundidade do stack trace
xdebug.stack_depth = -1

; Formatação do stack trace (html ou text)
xdebug.var_display_max_children = 128
xdebug.var_display_max_data = 512
xdebug.var_display_max_depth = 10

; For better performance with built-in server
xdebug.idekey = vsc