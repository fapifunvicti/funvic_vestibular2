version: '3.8'

services:
  php-apache:
    build: 
      context: .
      args:
        - HOST_UID=${UID:-1000}  # Pega seu UID local
        - HOST_GID=${GID:-1000}   # Pega seu GID local
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www/html
      - ./xdebug.ini:/usr/local/etc/php/conf.d/xdebug.ini
    environment:
      - APACHE_RUN_USER=www-data
      - APACHE_RUN_GROUP=www-data
      - XDEBUG_MODE=develop,debug
      - XDEBUG_CONFIG="client_host=host.docker.internal client_port=9003 idekey=VSCODE"
    depends_on:
      - mariadb
    extra_hosts:
      - "host.docker.internal:host-gateway"  # Conexão direta com o host
    networks:
      - app-network


  mariadb:
    image: mariadb:10.11
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: vestibular2
      MYSQL_USER: docker
      MYSQL_PASSWORD: docker
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./:/var/www/html
    networks:
      - app-network

  phpmyadmin:
    depends_on:
     - mariadb
    image: phpmyadmin:latest
    restart: unless-stopped
    ports:
      - 8090:80
    environment:
      PMA_HOST: mariadb
      PMA_ARBITRARY: 1
      MARIADB_ROOT_PASSWORD: root
    networks:
      - app-network


volumes:
  mariadb_data:

networks:
  app-network:
    driver: bridge
